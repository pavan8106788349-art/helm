apiVersion: apps/v1
kind: Deployment
metadata:
  metadata:
  name: nginx
  labels:
    app: nginx
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  annotations:
    kubernetes.io/change-cause: "{{ .values.deployment.changecause }}"
spec:
  replicas: "{{ .values.deployment.replicas}}"
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
  # This is pod definition, pod is subset of replicaset
  template:
  metadata:
    labels:
      app: nginx
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:"{{ .values.deployment.imageversion }}"

